<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="dogGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D2691E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#FFF8DC"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="920" rx="320" ry="40" fill="#00000015"/>
  </g>
  <g id="main-object">
    <!-- 狗身体 -->
    <ellipse cx="512" cy="560" rx="220" ry="180" fill="url(#dogGrad)"/>
    <ellipse cx="512" cy="570" rx="190" ry="150" fill="#D2691E"/>
    <!-- 狗头 -->
    <circle cx="512" cy="320" r="130" fill="#D2691E"/>
    <circle cx="512" cy="330" r="115" fill="#DEB887"/>
    <!-- 狗耳朵 -->
    <ellipse cx="380" cy="250" rx="50" ry="80" fill="#D2691E" transform="rotate(-20 380 250)"/>
    <ellipse cx="644" cy="250" rx="50" ry="80" fill="#D2691E" transform="rotate(20 644 250)"/>
    <ellipse cx="380" cy="255" rx="35" ry="60" fill="#DEB887" transform="rotate(-20 380 255)"/>
    <ellipse cx="644" cy="255" rx="35" ry="60" fill="#DEB887" transform="rotate(20 644 255)"/>
    <!-- 眼睛 -->
    <circle cx="455" cy="300" r="28" fill="#FFFFFF"/>
    <circle cx="569" cy="300" r="28" fill="#FFFFFF"/>
    <circle cx="455" cy="300" r="20" fill="#4A4A4A"/>
    <circle cx="569" cy="300" r="20" fill="#4A4A4A"/>
    <circle cx="455" cy="300" r="8" fill="#FFFFFF"/>
    <circle cx="569" cy="300" r="8" fill="#FFFFFF"/>
    <!-- 鼻子 -->
    <ellipse cx="512" cy="365" rx="30" ry="22" fill="#000000"/>
    <ellipse cx="512" cy="360" rx="20" ry="12" fill="#4A4A4A"/>
    <!-- 舌头 -->
    <ellipse cx="512" cy="410" rx="18" ry="30" fill="#FF69B4"/>
    <line x1="512" y1="400" x2="512" y2="430" stroke="#FF1493" stroke-width="2"/>
    <!-- 嘴巴微笑 -->
    <path d="M480 395 Q512 420 544 395" stroke="#4A4A4A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 腿 -->
    <g fill="#D2691E">
      <rect x="350" y="680" width="60" height="150" rx="25"/>
      <rect x="450" y="700" width="50" height="140" rx="25"/>
      <rect x="524" y="700" width="50" height="140" rx="25"/>
      <rect x="614" y="680" width="60" height="150" rx="25"/>
    </g>
    <!-- 爪子 -->
    <g fill="#DEB887">
      <ellipse cx="380" cy="830" rx="30" ry="18"/>
      <ellipse cx="475" cy="840" rx="25" ry="15"/>
      <ellipse cx="549" cy="840" rx="25" ry="15"/>
      <ellipse cx="644" cy="830" rx="30" ry="18"/>
    </g>
    <!-- 尾巴 -->
    <path d="M280 520 Q180 480 200 380 Q220 420 240 380 Q260 450 280 480" stroke="#D2691E" stroke-width="30" fill="none" stroke-linecap="round"/>
    <!-- 斑点 -->
    <g fill="#F5DEB3" opacity="0.7">
      <circle cx="400" cy="480" r="25"/>
      <circle cx="600" cy="500" r="30"/>
      <circle cx="350" cy="580" r="20"/>
      <circle cx="550" cy="650" r="25"/>
    </g>
  </g>
  <g id="expression">
    <!-- 开心笑容（已经画了） -->
    <!-- 脸颊 -->
    <circle cx="400" cy="350" r="22" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="624" cy="350" r="22" fill="#FFB6C1" opacity="0.6"/>
  </g>
  <g id="accent">
    <!-- 骨头 -->
    <g transform="translate(780, 450)">
      <ellipse cx="0" cy="0" rx="60" ry="15" fill="#FFFAFA"/>
      <circle cx="-50" cy="0" r="18" fill="#FFFAFA"/>
      <circle cx="50" cy="0" r="18" fill="#FFFAFA"/>
      <circle cx="-50" cy="0" r="12" fill="#F5F5F5"/>
      <circle cx="50" cy="0" r="12" fill="#F5F5F5"/>
    </g>
    <!-- 狗碗 -->
    <g transform="translate(200, 800)">
      <ellipse cx="0" cy="20" rx="60" ry="20" fill="#4169E1"/>
      <ellipse cx="0" cy="0" rx="60" ry="35" fill="#4682B4"/>
      <ellipse cx="0" cy="-10" rx="50" ry="25" fill="#87CEEB"/>
      <text x="0" y="10" font-size="20" text-anchor="middle" fill="#FFFFFF">骨头</text>
    </g>
    <!-- 草地 -->
    <path d="M0 870 Q256 840 512 870 Q768 900 1024 870 L1024 1024 L0 1024 Z" fill="#90EE90"/>
    <!-- 太阳 -->
    <circle cx="150" cy="150" r="45" fill="#FFD700"/>
    <circle cx="150" cy="150" r="30" fill="#FFEC8B"/>
  </g>
</svg>