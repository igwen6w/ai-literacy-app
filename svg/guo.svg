<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="appleGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#DC143C"/>
    </radialGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#FFF5EE"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="900" rx="300" ry="40" fill="#00000020"/>
  </g>
  <g id="main-object">
    <!-- 苹果主体 -->
    <circle cx="512" cy="450" r="220" fill="url(#appleGrad)"/>
    <circle cx="512" cy="450" r="190" fill="#FF6B6B"/>
    <!-- 苹果窝 -->
    <ellipse cx="512" cy="280" rx="30" ry="15" fill="#8B0000"/>
    <!-- 果柄 -->
    <path d="M512 260 Q520 200 540 160" stroke="#8B4513" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M540 160 Q560 140 580 150" stroke="#228B22" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 叶子 -->
    <ellipse cx="560" cy="140" rx="40" ry="20" fill="#228B22" transform="rotate(30 560 140)"/>
    <ellipse cx="490" cy="130" rx="35" ry="18" fill="#32CD32" transform="rotate(-20 490 130)"/>
    <!-- 高光 -->
    <ellipse cx="420" cy="350" rx="40" ry="60" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="390" cy="300" r="15" fill="#FFFFFF" opacity="0.25"/>
  </g>
  <g id="expression">
    <!-- 苹果开心表情 -->
    <circle cx="450" cy="430" r="20" fill="#FFFFFF"/>
    <circle cx="574" cy="430" r="20" fill="#FFFFFF"/>
    <circle cx="450" cy="430" r="10" fill="#8B0000"/>
    <circle cx="574" cy="430" r="10" fill="#8B0000"/>
    <circle cx="454" cy="426" r="4" fill="#FFFFFF"/>
    <circle cx="578" cy="426" r="4" fill="#FFFFFF"/>
    <path d="M460 480 Q512 530 564 480" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- 脸颊 -->
    <circle cx="390" cy="480" r="25" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="634" cy="480" r="25" fill="#FFB6C1" opacity="0.6"/>
  </g>
  <g id="accent">
    <!-- 另一个苹果 -->
    <g transform="translate(200, 550)">
      <circle cx="0" cy="0" r="100" fill="#FFA500"/>
      <circle cx="0" cy="0" r="85" fill="#FFB347"/>
      <ellipse cx="0" cy="-80" rx="15" ry="8" fill="#8B4513"/>
      <path d="M0 -80 Q10 -120 30 -140" stroke="#228B22" stroke-width="6" fill="none" stroke-linecap="round"/>
      <ellipse cx="30" cy="-145" rx="20" ry="10" fill="#228B22" transform="rotate(30)"/>
    </g>
    <!-- 葡萄串 -->
    <g transform="translate(750, 500)">
      <circle cx="0" cy="0" r="25" fill="#9932CC"/>
      <circle cx="-25" cy="20" r="25" fill="#8B008B"/>
      <circle cx="25" cy="20" r="25" fill="#9400D3"/>
      <circle cx="0" cy="45" r="25" fill="#9932CC"/>
      <circle cx="-25" cy="70" r="22" fill="#8B008B"/>
      <circle cx="25" cy="70" r="22" fill="#9400D3"/>
      <circle cx="0" cy="90" r="18" fill="#9932CC"/>
    </g>
    <!-- 草地 -->
    <path d="M0 820 Q256 790 512 820 Q768 850 1024 820 L1024 1024 L0 1024 Z" fill="#90EE90"/>
  </g>
</svg>