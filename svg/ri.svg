<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFF00"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </radialGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#FFF8DC"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="900" rx="350" ry="50" fill="#00000015"/>
  </g>
  <g id="main-object">
    <!-- 太阳主体 -->
    <circle cx="512" cy="480" r="280" fill="url(#sunGrad)"/>
    <circle cx="512" cy="480" r="230" fill="#FFEC8B"/>
    <circle cx="512" cy="480" r="180" fill="#FFFACD"/>
    <!-- 光芒 -->
    <g stroke="#FFA500" stroke-width="28" stroke-linecap="round">
      <line x1="512" y1="140" x2="512" y2="60"/>
      <line x1="760" y1="220" x2="820" y2="160"/>
      <line x1="900" y1="480" x2="980" y2="480"/>
      <line x1="760" y1="740" x2="820" y2="800"/>
      <line x1="264" y1="220" x2="204" y2="160"/>
      <line x1="124" y1="480" x2="44" y2="480"/>
      <line x1="264" y1="740" x2="204" y2="800"/>
      <!-- 斜向光芒 -->
      <line x1="650" y1="190" x2="700" y2="140"/>
      <line x1="720" y1="320" x2="780" y2="280"/>
      <line x1="650" y1="770" x2="700" y2="820"/>
      <line x1="720" y1="640" x2="780" y2="680"/>
      <line x1="374" y1="190" x2="324" y2="140"/>
      <line x1="304" y1="320" x2="244" y2="280"/>
      <line x1="374" y1="770" x2="324" y2="820"/>
      <line x1="304" y1="640" x2="244" y2="680"/>
    </g>
    <!-- 红脸蛋 -->
    <circle cx="380" cy="500" r="35" fill="#FFB6C1"/>
    <circle cx="644" cy="500" r="35" fill="#FFB6C1"/>
  </g>
  <g id="expression">
    <!-- 开心表情 -->
    <circle cx="440" cy="450" r="22" fill="#5D4037"/>
    <circle cx="444" cy="446" r="8" fill="#FFFFFF"/>
    <circle cx="584" cy="450" r="22" fill="#5D4037"/>
    <circle cx="588" cy="446" r="8" fill="#FFFFFF"/>
    <path d="M450 520 Q512 580 574 520" stroke="#5D4037" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
  <g id="accent">
    <!-- 小云朵 -->
    <g fill="#FFFFFF">
      <ellipse cx="200" cy="180" rx="60" ry="40"/>
      <ellipse cx="250" cy="165" rx="50" ry="35"/>
      <ellipse cx="160" cy="170" rx="45" ry="30"/>
    </g>
    <!-- 光芒闪烁 -->
    <circle cx="180" cy="280" r="12" fill="#FF6B6B" opacity="0.8"/>
    <circle cx="844" cy="380" r="10" fill="#FFB6C1" opacity="0.8"/>
    <circle cx="750" cy="180" r="8" fill="#87CEEB" opacity="0.8"/>
  </g>
</svg>
