<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#228B22"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#F0FFF0"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="940" rx="380" ry="40" fill="#00000015"/>
  </g>
  <g id="main-object">
    <!-- 田埂 -->
    <path d="M100 850 L100 750 Q150 740 200 750 L200 650 Q250 640 300 650 L300 550 Q350 540 400 550 L400 450" stroke="#8B4513" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M924 850 L924 750 Q874 740 824 750 L824 650 Q774 640 724 650 L724 550 Q674 540 624 550 L624 450" stroke="#8B4513" stroke-width="30" fill="none" stroke-linecap="round"/>
    <!-- 水田块 -->
    <rect x="150" y="580" width="250" height="200" rx="20" fill="#87CEEB" opacity="0.8"/>
    <rect x="624" y="580" width="250" height="200" rx="20" fill="#87CEEB" opacity="0.8"/>
    <rect x="150" y="250" width="250" height="200" rx="20" fill="#90EE90"/>
    <rect x="624" y="250" width="250" height="200" rx="20" fill="#90EE90"/>
    <!-- 稻苗 -->
    <g fill="#32CD32">
      <path d="M200 280 Q205 240 210 280 Q215 240 220 280"/>
      <path d="M240 290 Q245 250 250 290 Q255 250 260 290"/>
      <path d="M180 300 Q185 260 190 300 Q195 260 200 300"/>
      <path d="M280 285 Q285 245 290 285 Q295 245 300 285"/>
      <path d="M320 295 Q325 255 330 295 Q335 255 340 295"/>
      <path d="M670 280 Q675 240 680 280 Q685 240 690 280"/>
      <path d="M710 290 Q715 250 720 290 Q725 250 730 290"/>
      <path d="M650 300 Q655 260 660 300 Q665 260 670 300"/>
      <path d="M750 285 Q755 245 760 285 Q765 245 770 285"/>
    </g>
    <!-- 成熟稻穗 -->
    <g fill="#FFD700">
      <ellipse cx="220" cy="320" rx="8" ry="20"/>
      <ellipse cx="260" cy="330" rx="8" ry="22"/>
      <ellipse cx="300" cy="325" rx="8" ry="21"/>
      <ellipse cx="690" cy="320" rx="8" ry="20"/>
      <ellipse cx="730" cy="330" rx="8" ry="22"/>
    </g>
  </g>
  <g id="expression">
    <!-- 田地爷爷的笑容 -->
    <circle cx="380" cy="780" r="15" fill="#5D4037"/>
    <circle cx="560" cy="770" r="15" fill="#5D4037"/>
    <path d="M420 810 Q470 850 520 810" stroke="#5D4037" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  <g id="accent">
    <!-- 太阳 -->
    <circle cx="512" cy="120" r="50" fill="#FFD700"/>
    <circle cx="512" cy="120" r="35" fill="#FFEC8B"/>
    <!-- 云朵 -->
    <g fill="#FFFFFF">
      <ellipse cx="180" cy="180" rx="60" ry="40"/>
      <ellipse cx="230" cy="165" rx="50" ry="35"/>
      <ellipse cx="140" cy="170" rx="45" ry="30"/>
      <ellipse cx="844" cy="150" rx="60" ry="40"/>
      <ellipse cx="894" cy="135" rx="50" ry="35"/>
    </g>
    <!-- 蝴蝶 -->
    <g transform="translate(450, 400)">
      <ellipse cx="-20" cy="0" rx="20" ry="15" fill="#FFB6C1" transform="rotate(-30)"/>
      <ellipse cx="20" cy="0" rx="20" ry="15" fill="#FFB6C1" transform="rotate(30)"/>
      <ellipse cx="-15" cy="5" rx="12" ry="8" fill="#FF69B4" transform="rotate(-30)"/>
      <ellipse cx="15" cy="5" rx="12" ry="8" fill="#FF69B4" transform="rotate(30)"/>
      <ellipse cx="0" cy="0" rx="5" ry="15" fill="#8B4513"/>
    </g>
  </g>
</svg>
