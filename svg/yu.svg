<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="fishGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#E0FFFF"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="900" rx="350" ry="40" fill="#00000010"/>
  </g>
  <g id="main-object">
    <!-- 鱼身体 -->
    <ellipse cx="512" cy="480" rx="250" ry="150" fill="url(#fishGrad)"/>
    <ellipse cx="512" cy="490" rx="220" ry="120" fill="#FFA500"/>
    <!-- 鱼鳞 -->
    <g fill="#FFD700" opacity="0.6">
      <circle cx="350" cy="450" r="20"/>
      <circle cx="400" cy="420" r="20"/>
      <circle cx="450" cy="390" r="20"/>
      <circle cx="500" cy="380" r="20"/>
      <circle cx="550" cy="390" r="20"/>
      <circle cx="600" cy="420" r="20"/>
      <circle cx="350" cy="510" r="20"/>
      <circle cx="400" cy="540" r="20"/>
      <circle cx="450" cy="560" r="20"/>
      <circle cx="500" cy="570" r="20"/>
      <circle cx="550" cy="560" r="20"/>
      <circle cx="600" cy="540" r="20"/>
    </g>
    <!-- 鱼鳍 -->
    <path d="M380 380 Q350 300 420 350 Z" fill="#FF8C00"/>
    <path d="M644 380 Q674 300 604 350 Z" fill="#FF8C00"/>
    <path d="M512 330 Q512 250 560 300 L512 330 Z" fill="#FFA500"/>
    <!-- 鱼尾 -->
    <path d="M750 480 Q850 400 850 480 Q850 560 750 480 Z" fill="#FF6B6B"/>
    <path d="M740 480 Q830 420 830 480 Q830 540 740 480 Z" fill="#FFA500"/>
    <!-- 鱼眼睛 -->
    <circle cx="300" cy="450" r="30" fill="#FFFFFF"/>
    <circle cx="300" cy="450" r="20" fill="#000000"/>
    <circle cx="295" cy="445" r="8" fill="#FFFFFF"/>
  </g>
  <g id="expression">
    <!-- 微笑 -->
    <path d="M280 490 Q310 520 340 490" stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- 腮红 -->
    <circle cx="260" cy="480" r="15" fill="#FFB6C1" opacity="0.5"/>
    <circle cx="340" cy="490" r="12" fill="#FFB6C1" opacity="0.5"/>
  </g>
  <g id="accent">
    <!-- 气泡 -->
    <g fill="#B0E0E6" opacity="0.6">
      <circle cx="200" cy="350" r="15"/>
      <circle cx="180" cy="300" r="10"/>
      <circle cx="220" cy="250" r="8"/>
      <circle cx="800" cy="300" r="12"/>
      <circle cx="830" cy="250" r="8"/>
      <circle cx="780" cy="200" r="6"/>
    </g>
    <!-- 水草 -->
    <g fill="#228B22">
      <path d="M100 850 Q90 750 110 650 Q130 550 100 450 Q80 550 100 650 Q80 750 100 850"/>
      <path d="M150 850 Q140 770 160 690 Q180 610 160 530 Q140 610 160 690 Q140 770 150 850"/>
      <path d="M874 850 Q864 750 884 650 Q904 550 874 450 Q854 550 874 650 Q854 750 874 850"/>
      <path d="M924 850 Q914 770 934 690 Q954 610 934 530 Q914 610 934 690 Q914 770 924 850"/>
    </g>
    <!-- 海底石头 -->
    <ellipse cx="250" cy="820" rx="60" ry="30" fill="#808080"/>
    <ellipse cx="774" cy="800" rx="50" ry="25" fill="#A9A9A9"/>
    <!-- 小鱼 -->
    <g transform="translate(700, 650)">
      <ellipse cx="0" cy="0" rx="40" ry="25" fill="#87CEEB"/>
      <circle cx="-20" cy="0" r="12" fill="#FFFFFF"/>
      <circle cx="-20" cy="0" r="8" fill="#000000"/>
      <path d="M35 0 Q50 -15 50 0 Q50 15 35 0" fill="#00CED1"/>
    </g>
  </g>
</svg>