<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="flowerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="100%" style="stop-color:#FF1493"/>
    </radialGradient>
  </defs>
  <g id="background">
    <rect width="1024" height="1024" rx="80" fill="#FFF0F5"/>
  </g>
  <g id="shadow">
    <ellipse cx="512" cy="920" rx="300" ry="40" fill="#00000015"/>
  </g>
  <g id="main-object">
    <!-- 花瓣 -->
    <g fill="#FFB6C1">
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(0 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(45 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(90 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(135 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(180 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(225 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(270 512 400)"/>
      <ellipse cx="512" cy="250" rx="80" ry="120" transform="rotate(315 512 400)"/>
    </g>
    <g fill="#FF69B4">
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(22.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(67.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(112.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(157.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(202.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(247.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(292.5 512 400)"/>
      <ellipse cx="512" cy="280" rx="60" ry="90" transform="rotate(337.5 512 400)"/>
    </g>
    <!-- 花心 -->
    <circle cx="512" cy="400" r="60" fill="url(#flowerGrad)"/>
    <circle cx="512" cy="400" r="45" fill="#FFD700"/>
    <circle cx="512" cy="400" r="30" fill="#FFA500"/>
    <!-- 花茎 -->
    <path d="M512 460 Q508 600 520 750" stroke="#32CD32" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M512 460 Q510 600 515 750" stroke="#228B22" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 叶子 -->
    <path d="M520 550 Q600 530 650 480 Q680 440 660 430 Q640 420 600 460 Q560 500 515 540" fill="#32CD32"/>
    <path d="M505 620 Q430 600 380 560 Q350 520 370 510 Q390 500 430 540 Q470 580 500 610" fill="#32CD32"/>
    <path d="M518 700 Q580 680 620 640 Q650 600 630 590 Q610 580 575 620 Q540 660 512 690" fill="#90EE90"/>
  </g>
  <g id="expression">
    <!-- 花朵开心表情 -->
    <circle cx="485" cy="390" r="15" fill="#8B4513"/>
    <circle cx="539" cy="390" r="15" fill="#8B4513"/>
    <circle cx="485" cy="390" r="6" fill="#FFFFFF"/>
    <circle cx="539" cy="390" r="6" fill="#FFFFFF"/>
    <path d="M490 420 Q512 450 534 420" stroke="#8B4513" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <g id="accent">
    <!-- 蝴蝶 -->
    <g transform="translate(180, 300)">
      <ellipse cx="-20" cy="0" rx="20" ry="15" fill="#9370DB" transform="rotate(-30)"/>
      <ellipse cx="20" cy="0" rx="20" ry="15" fill="#9370DB" transform="rotate(30)"/>
      <ellipse cx="-15" cy="5" rx="12" ry="8" fill="#FFFFFF" transform="rotate(-30)"/>
      <ellipse cx="15" cy="5" rx="12" ry="8" fill="#FFFFFF" transform="rotate(30)"/>
      <ellipse cx="0" cy="0" rx="4" ry="15" fill="#4B0082"/>
    </g>
    <!-- 小蜜蜂 -->
    <g transform="translate(780, 500)">
      <ellipse cx="0" cy="0" rx="25" ry="18" fill="#FFD700"/>
      <line x1="-20" y1="-5" x2="-20" y2="5" stroke="#000000" stroke-width="3"/>
      <line x1="-10" y1="-5" x2="-10" y2="5" stroke="#000000" stroke-width="3"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#000000" stroke-width="3"/>
      <line x1="10" y1="-5" x2="10" y2="5" stroke="#000000" stroke-width="3"/>
      <ellipse cx="-30" cy="0" rx="8" ry="15" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
      <ellipse cx="30" cy="0" rx="8" ry="15" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
    </g>
    <!-- 草地 -->
    <path d="M0 850 Q256 820 512 850 Q768 880 1024 850 L1024 1024 L0 1024 Z" fill="#90EE90"/>
  </g>
</svg>
